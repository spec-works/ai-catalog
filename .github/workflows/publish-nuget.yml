name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to NuGet'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore dotnet/AiCatalog.sln

      - name: Test
        run: dotnet test dotnet/AiCatalog.sln -c Release --no-restore --nologo

      - name: Pack library
        run: dotnet pack dotnet/src/AiCatalog/AiCatalog.csproj -c Release --no-restore --no-build -p:ContinuousIntegrationBuild=true -o artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.*nupkg

      - name: Publish package
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.publish) && secrets.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
          dotnet nuget push "artifacts/*.snupkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
